{% macro icon(name, class_name="icon") -%}
<svg class="{{ class_name }}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    {% if name == "dashboard" %}
        <rect x="3" y="3" width="7" height="7" rx="1.5"></rect><rect x="14" y="3" width="7" height="7" rx="1.5"></rect><rect x="3" y="14" width="7" height="7" rx="1.5"></rect><rect x="14" y="14" width="7" height="7" rx="1.5"></rect>
    {% elif name == "scan" %}
        <path d="M4 8V5a1 1 0 0 1 1-1h3M16 4h3a1 1 0 0 1 1 1v3M20 16v3a1 1 0 0 1-1 1h-3M8 20H5a1 1 0 0 1-1-1v-3"></path><circle cx="12" cy="11" r="3"></circle><path d="M7.5 18c.8-2.4 2.3-3.6 4.5-3.6s3.7 1.2 4.5 3.6"></path>
    {% elif name == "employees" %}
        <path d="M16 20v-1.5a4.5 4.5 0 0 0-4.5-4.5h-4A4.5 4.5 0 0 0 3 18.5V20"></path><circle cx="9.5" cy="7.5" r="3.5"></circle><path d="M16 4.2a3.5 3.5 0 0 1 0 6.6M18 14.2a4.5 4.5 0 0 1 3 4.3V20"></path>
    {% elif name == "users" %}
        <circle cx="9" cy="8" r="4"></circle><path d="M3 21v-2a6 6 0 0 1 12 0v2M17 11h4M19 9v4"></path>
    {% elif name == "review" %}
        <path d="M9 5h10a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V9"></path><path d="M3 3h6v6H3zM9 16l2 2 5-5"></path>
    {% elif name == "settings" %}
        <circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1-2.8 2.8-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.6v.2h-4V21a1.7 1.7 0 0 0-1-1.6 1.7 1.7 0 0 0-1.9.3l-.1.1L4.2 17l.1-.1a1.7 1.7 0 0 0 .3-1.9A1.7 1.7 0 0 0 3 14H2.8v-4H3a1.7 1.7 0 0 0 1.6-1 1.7 1.7 0 0 0-.3-1.9L4.2 7 7 4.2l.1.1a1.7 1.7 0 0 0 1.9.3A1.7 1.7 0 0 0 10 3V2.8h4V3a1.7 1.7 0 0 0 1 1.6 1.7 1.7 0 0 0 1.9-.3l.1-.1L19.8 7l-.1.1a1.7 1.7 0 0 0-.3 1.9 1.7 1.7 0 0 0 1.6 1h.2v4H21a1.7 1.7 0 0 0-1.6 1z"></path>
    {% elif name == "logout" %}
        <path d="M10 17l5-5-5-5M15 12H3M14 3h5a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-5"></path>
    {% elif name == "menu" %}
        <path d="M4 7h16M4 12h16M4 17h16"></path>
    {% elif name == "chevron" %}
        <path d="m9 18 6-6-6-6"></path>
    {% elif name == "close" %}
        <path d="M6 6l12 12M18 6 6 18"></path>
    {% elif name == "building" %}
        <path d="M4 21V5a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v16M17 9h3v12M8 7h2M13 7h1M8 11h2M13 11h1M8 15h2M13 15h1M2 21h20"></path>
    {% elif name == "user-check" %}
        <path d="M15 20v-1.5a4.5 4.5 0 0 0-4.5-4.5h-3A4.5 4.5 0 0 0 3 18.5V20"></path><circle cx="9" cy="7" r="4"></circle><path d="m16 11 2 2 4-4"></path>
    {% elif name == "face" %}
        <path d="M4 8V5a1 1 0 0 1 1-1h3M16 4h3a1 1 0 0 1 1 1v3M20 16v3a1 1 0 0 1-1 1h-3M8 20H5a1 1 0 0 1-1-1v-3M9 10h.01M15 10h.01M9 15c2 1.3 4 1.3 6 0"></path>

        <rect x="3" y="5" width="18" height="16" rx="2"></rect><path d="M16 3v4M8 3v4M3 10h18m-12 5 2 2 4-4"></path>
    {% elif name == "clock" %}
        <circle cx="12" cy="12" r="9"></circle><path d="M12 7v5l3 2"></path>
    {% elif name == "alert" %}
        <path d="M10.3 3.7 2.4 17.3A1.8 1.8 0 0 0 4 20h16a1.8 1.8 0 0 0 1.6-2.7L13.7 3.7a2 2 0 0 0-3.4 0zM12 9v4M12 17h.01"></path>
    {% elif name == "arrow-right" %}
        <path d="M5 12h14M13 6l6 6-6 6"></path>
    {% elif name == "camera" %}
        <path d="M14.5 5 13 3H8L6.5 5H4a2 2 0 0 0-2 2v11a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2z"></path><circle cx="10.5" cy="12.5" r="4"></circle>
    {% elif name == "plus" %}
        <path d="M12 5v14M5 12h14"></path>
    {% elif name == "inbox" %}
        <path d="M4 4h16l2 10v5a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2v-5zM2 14h5l2 3h6l2-3h5"></path>
    {% elif name == "more" %}
        <circle cx="5" cy="12" r="1"></circle><circle cx="12" cy="12" r="1"></circle><circle cx="19" cy="12" r="1"></circle>
    {% endif %}
</svg>
{%- endmacro %}
