{% extends "base.html" %}

{% block title %}Reset Password | Facial Attendance{% endblock %}

{% block auth_content %}
<section class="auth-card">
    <header class="auth-card-header"><p class="eyebrow">Account recovery</p><h2>Reset your password</h2><p>Verify your security answer, then choose a new password.</p></header>
    <form method="post" class="form-grid">
        <label class="field"><span>Username</span><input type="text" name="username" autocomplete="username" autofocus required></label>
        <label class="field"><span>Security Answer</span><input type="text" name="security_answer" autocomplete="off" required></label>
        <label class="field"><span>New Password</span><input type="password" name="new_password" autocomplete="new-password" required></label>
        <label class="field"><span>Confirm Password</span><input type="password" name="confirm_password" autocomplete="new-password" required></label>
        <button class="button button-primary button-full" type="submit">Reset Password</button>
        <a class="button button-ghost button-full" href="{{ url_for('login') }}">Back to Sign In</a>
    </form>
</section>
{% endblock %}
