[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "dlib"
version = "20.0.1"
description = "Shim package that satisfies face-recognition's dlib dependency via dlib-bin."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "dlib-bin==20.0.1",
]

[tool.setuptools]
py-modules = []
